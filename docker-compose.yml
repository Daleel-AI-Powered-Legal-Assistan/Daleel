version: "3.9"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - hf_model_cache:/root/.cache/huggingface
      - qdrant_data:/app/output/qdrant_db
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  neo4j:
    image: neo4j:5-community
    container_name: jordan_law_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/law_project_2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "law_project_2024", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  hf_model_cache:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
