<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0dca8"/>
      <stop offset="100%" stop-color="#b8a060"/>
    </linearGradient>
    <linearGradient id="panGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="40%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#8a6914"/>
    </linearGradient>
    <radialGradient id="sphereGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="50%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#d4a017" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="50" fill="#0f1117"/>
  <circle cx="256" cy="210" r="220" fill="url(#bgGlow)"/>

  <g filter="url(#glow)">
    <!-- Central pillar -->
    <rect x="250" y="95" width="12" height="175" rx="6" fill="url(#pillarGrad)"/>

    <!-- Top sphere -->
    <circle cx="256" cy="90" r="16" fill="url(#sphereGrad)"/>
    <ellipse cx="252" cy="84" rx="5" ry="4" fill="#fff" fill-opacity="0.3"/>

    <!-- Crossbeam -->
    <rect x="128" y="108" width="256" height="8" rx="4" fill="url(#pillarGrad)"/>

    <!-- Left arm sphere -->
    <circle cx="132" cy="112" r="10" fill="url(#sphereGrad)"/>

    <!-- Right arm sphere -->
    <circle cx="380" cy="112" r="10" fill="url(#sphereGrad)"/>

    <!-- Left chains -->
    <line x1="132" y1="122" x2="112" y2="195" stroke="#e8d4a0" stroke-width="2"/>
    <line x1="132" y1="122" x2="132" y2="195" stroke="#e8d4a0" stroke-width="2"/>
    <line x1="132" y1="122" x2="152" y2="195" stroke="#e8d4a0" stroke-width="2"/>

    <!-- Left pan -->
    <ellipse cx="132" cy="198" rx="56" ry="8" fill="url(#goldGrad)"/>
    <path d="M76,198 Q78,198 80,202 Q100,235 132,240 Q164,235 184,202 Q186,198 188,198 Z" fill="url(#panGrad)"/>

    <!-- Right chains -->
    <line x1="380" y1="122" x2="360" y2="195" stroke="#e8d4a0" stroke-width="2"/>
    <line x1="380" y1="122" x2="380" y2="195" stroke="#e8d4a0" stroke-width="2"/>
    <line x1="380" y1="122" x2="400" y2="195" stroke="#e8d4a0" stroke-width="2"/>

    <!-- Right pan -->
    <ellipse cx="380" cy="198" rx="56" ry="8" fill="url(#goldGrad)"/>
    <path d="M324,198 Q326,198 328,202 Q348,235 380,240 Q412,235 432,202 Q434,198 436,198 Z" fill="url(#panGrad)"/>

    <!-- Base -->
    <ellipse cx="256" cy="270" rx="36" ry="7" fill="url(#pillarGrad)"/>
  </g>

  <!-- DALEEL text -->
  <text x="256" y="335" text-anchor="middle"
        font-family="'Segoe UI', 'Inter', sans-serif"
        font-size="28" font-weight="700" fill="#f5c842"
        letter-spacing="12">DALEEL</text>

</svg>
